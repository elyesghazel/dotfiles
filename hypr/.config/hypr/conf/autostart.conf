# core services
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = LD_LIBRARY_PATH=/opt/vicinae-libs vicinae server
exec-once = nm-applet

# wallpaper & display
exec-once = awww-daemon
exec-once = hyprctl dispatch focusmonitor DP-2
# set random wallpaper on startup
exec-once = awww img ~/wallpapers/DT2.jpg

# external settings
exec = ~/.config/ml4w-hyprland-settings/hyprctl.sh

# clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


exec-once = hypridle

exec-once = quickshell -p /home/elyes/apps/qs-hyprview
