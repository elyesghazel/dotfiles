decoration {
    rounding = 15
    
    # opacity
    active_opacity = 0.90
    inactive_opacity = 0.80
    fullscreen_opacity = 1.0

    # blur effect
    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
        xray = true
    }

    # shadows
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.5)
    }
}