background {
    monitor =
    path = $HOME/wallpapers/DT2.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# Clock - center top
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(0,0,0,0.5)
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
}

# Username
label {
    monitor =
    text =  $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Input field
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgb(220, 220, 220)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##ffffff66">🔒 Enter Password</span>
    hide_input = false
    rounding = 12
    check_color = rgba(100, 200, 150, 0.8)
    fail_color = rgba(200, 50, 50, 0.8)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300
    capslock_color = rgba(255, 200, 50, 0.8)
    position = 0, -170
    halign = center
    valign = center
}
