format = """
┌─$username$hostname$directory$git_branch$git_status$time$cmd_duration$status
└─$character"""

add_newline = false

# ── user@host ──────────────────────────────────────────────────────────────────
[username]
style_user = "bold green"
style_root = "bold red"
format     = "\\[[$user@]($style_user)"
show_always = true

[hostname]
ssh_only = false
style    = "bold green"
format   = "[$hostname\\]]($style)"

# ── directory ──────────────────────────────────────────────────────────────────
[directory]
style                  = "bold cyan"
format                 = "─\\[[$path]($style)\\]"
truncation_length      = 5
fish_style_pwd_dir_length = 1

# ── git ────────────────────────────────────────────────────────────────────────
[git_branch]
symbol = ""
style  = "bold purple"
format = "─\\[[$branch]($style) "

[git_status]
style      = "bold green"
format     = "[$all_status$ahead_behind]($style)\\]"
up_to_date = "✓"
modified   = "*"
staged     = "+"
untracked  = "?"
deleted    = "✘"
conflicted = "!"
stashed    = ""
renamed    = ""
ahead      = "↑$count"
behind     = "↓$count"
diverged   = "↕"

# ── time ───────────────────────────────────────────────────────────────────────
[time]
disabled    = false
style       = "bold white"
format      = "─\\[[$time]($style)\\]"
time_format = "%H:%M:%S"

# ── duration ───────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style    = "bold yellow"
format   = "─\\[[$duration]($style)\\]"

# ── exit code ──────────────────────────────────────────────────────────────────
[status]
disabled = false
style    = "bold red"
format   = "─\\[[✘ $status]($style)\\]"

# ── prompt character ───────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
