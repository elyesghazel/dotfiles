format = """
$directory\
$git_branch\
$git_status\
$rust\
$nodejs\
$golang\
$python\
$php\
$cmd_duration\
$line_break\
$character"""

add_newline = false

# ── directory ──────────────────────────────────────────────────────────────────
[directory]
style            = "bold cyan"
format           = "[$path]($style) "
truncation_length = 1
truncation_symbol = ""

# ── git ────────────────────────────────────────────────────────────────────────
[git_branch]
symbol = "  "
style  = "bold purple"
format = "[on ](white)[$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = '(\[[$all_status$ahead_behind]($style)\] )'
modified   = "*"
staged     = "+"
untracked  = "?"
deleted    = "✘"
conflicted = "!"
stashed    = ""
renamed    = ""
ahead      = "↑$count"
behind     = "↓$count"
diverged   = "↕"

# ── languages ──────────────────────────────────────────────────────────────────
[rust]
symbol = "🦀 "
style  = "bold red"
format = "[is ]($style)[$symbol$version]($style) "

[nodejs]
symbol = " "
style  = "bold green"
format = "[via ](white)[$symbol$version]($style) "

[golang]
symbol = "🐹 "
style  = "bold cyan"
format = "[via ](white)[$symbol$version]($style) "

[python]
symbol = "🐍 "
style  = "bold yellow"
format = "[via ](white)[$symbol$version]($style) "

[php]
symbol = "🐘 "
style  = "bold blue"
format = "[via ](white)[$symbol$version]($style) "

# ── duration ───────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style    = "bold yellow"
format   = "[took ](white)[$duration]($style) "

# ── prompt ─────────────────────────────────────────────────────────────────────
[character]
success_symbol = "[>](bold green)"
error_symbol   = "[>](bold red)"
