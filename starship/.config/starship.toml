# 1. global settings
format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ пМГ ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
modified = "[вЬШ](fg:#f38ba8 bg:#394260)"
untracked = "[?](fg:#f38ba8 bg:#394260)"
staged = "[вЬФ](fg:#a6e3a1 bg:#394260)"
deleted = "рЯЧС "
[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[character]
success_symbol = "[ вЮЬ ](bold fg:#769ff0)"
error_symbol = "[ вЮЬ ](bold fg:#f38ba8)"