# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Transparency
background_opacity 0.75
blur_program none

# Catppuccin Mocha
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6EB9D

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Window
window_padding_width 8
remember_window_size no
initial_window_width  800
initial_window_height 500

# Misc
scrollback_lines 10000
enable_audio_bell no
confirm_os_window_close 0
