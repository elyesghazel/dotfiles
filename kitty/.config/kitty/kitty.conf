# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Transparency
background_opacity 0.96
blur_program none

# Dark theme
foreground              #c8c8c8
background              #0b0b0b
selection_foreground    #0b0b0b
selection_background    #c8c8c8

color0  #1a1a1a
color1  #cc6666
color2  #6fb35e
color3  #d4a94c
color4  #5f87af
color5  #9e6faf
color6  #56a8af
color7  #c5c8c6
color8  #333333
color9  #cc6666
color10 #6fb35e
color11 #d4a94c
color12 #81a2be
color13 #b294bb
color14 #8abeb7
color15 #e4e4e4

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Window
window_padding_width 8
remember_window_size no
initial_window_width  800
initial_window_height 500

# Misc
scrollback_lines 10000
enable_audio_bell no
confirm_os_window_close 0
